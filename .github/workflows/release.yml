# Builds the plugin distribution and publishes a GitHub release.
#
# Trigger by pushing a semver tag, e.g.:
#   git tag v0.6.1 && git push origin v0.6.1
# The pluginVersion (patched into plugin.xml and the zip name) is derived from
# the tag with the leading `v` stripped. A tag with a pre-release suffix
# (e.g. v0.7.0-rc1) is published as a GitHub pre-release.
#
# Can also be run manually from the Actions tab (workflow_dispatch) with an
# explicit version; that build is uploaded as an artifact but not released.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version for a manual build (no release is published)"
        required: true
        default: "0.0.0-dev"

permissions:
  contents: write # create the GitHub release and upload the asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      # Tag v1.2.3 -> 1.2.3 ; manual run -> the dispatch input. Untrusted input
      # (the tag name and the dispatch field) is read from env, never spliced
      # into the script via ${{ }}, so it can't break out of the assignment.
      - name: Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          # Reject anything that isn't a SemVer-ish string. [[ =~ ]] anchors
          # against the whole value, so an embedded newline fails the match —
          # this blocks newline-injection into $GITHUB_OUTPUT and stops a stray
          # tag/input from producing an invalid release.
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "Invalid version '$VERSION'; expected SemVer like 1.2.3 or 1.2.3-rc1." >&2
            exit 1
          fi
          # Pre-release if the version carries a suffix like -rc1 / -beta.
          if [[ "$VERSION" == *-* ]]; then PRERELEASE=true; else PRERELEASE=false; fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          printf 'prerelease=%s\n' "$PRERELEASE" >> "$GITHUB_OUTPUT"

      # Gate the release on the tests, then assemble the distributable. The
      # build downloads the full ESPHome catalog (vendorCatalog) and the IDE SDK.
      - name: Test and build plugin
        run: >-
          ./gradlew :catalog:test :plugin:test :plugin:buildPlugin
          -PpluginVersion=${{ steps.version.outputs.version }}
          --stacktrace

      # Gate the release on binary compatibility across the supported IDE range
      # (downloads the recommended IDEs). Fails on real compatibility problems,
      # so a build like the IconUtil.colorize 2025.1 break can't be published.
      - name: Verify plugin compatibility
        run: >-
          ./gradlew :plugin:verifyPlugin
          -PpluginVersion=${{ steps.version.outputs.version }}
          --stacktrace

      - name: Locate distribution
        id: dist
        run: |
          ZIP="plugin/build/distributions/esphome-clion-plugin-${{ steps.version.outputs.version }}.zip"
          test -f "$ZIP" || { echo "Expected $ZIP not found"; ls -l plugin/build/distributions; exit 1; }
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      # The release body: this version's CHANGELOG.md section, falling back to
      # the [Unreleased] section (and to auto-generated notes if neither exists).
      - name: Extract release notes
        run: |
          awk -v ver="${{ steps.version.outputs.version }}" '
            /^## \[/ {
              if (printing) exit
              if (index($0, "[" ver "]") || (!found && index($0, "[Unreleased]"))) { printing=1; found=1; next }
            }
            printing { print }
          ' CHANGELOG.md > release-notes.md
          [ -s release-notes.md ] || echo "See the plugin change notes." > release-notes.md

      # Manual runs: keep the build as an artifact, don't publish a release.
      - name: Upload build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v5
        with:
          name: esphome-clion-plugin-${{ steps.version.outputs.version }}
          path: ${{ steps.dist.outputs.zip }}

      # Tag pushes: publish the release with the zip attached.
      - name: Publish GitHub release
        if: github.event_name == 'push'
        # Pinned to a full commit SHA (supply-chain hygiene for a third-party
        # action); v3.0.0 is the Node 24 runtime, clearing the Node 20 warning.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: ${{ steps.dist.outputs.zip }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          body_path: release-notes.md
          append_body: true
          generate_release_notes: true

      # Publish to the JetBrains Marketplace — only when the signing/publish
      # secrets are configured. Pre-release versions go to the `beta` channel
      # (handled in plugin/build.gradle.kts). Requires PUBLISH_TOKEN (Marketplace)
      # and the plugin-signing CERTIFICATE_CHAIN / PRIVATE_KEY / PRIVATE_KEY_PASSWORD.
      - name: Publish to JetBrains Marketplace
        if: github.event_name == 'push' && env.PUBLISH_TOKEN != ''
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew :plugin:publishPlugin -PpluginVersion=${{ steps.version.outputs.version }} --stacktrace
