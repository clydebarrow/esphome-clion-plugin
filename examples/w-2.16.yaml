substitutions:
  name: wave-2-16
  friendly_name: Waveshare 2.16 AMOLED
  bubble_size: 200

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

i
packages:
  - !include standard.yaml
  - !include gyro-package.yaml

external_components:
  - source:
      type: git
      url: "file:///Users/clyde/dev/opensourceprojects/esp/esphome"
      ref: cst9220
    components: [cst9220]
  - source:
      type: git
      url: "file:///Users/clyde/dev/opensourceprojects/esphome"
      ref: qmi8658
    components: [qmi8658]

psram:
  mode: octal
  speed: 80MHz

spi:
  - id: display_spi
    type:
    clk_pin: GPIO38
    data_pins:
      - GPIO4
      - GPIO5
      - GPIO6
      - GPIO7

display:
  - platform: mipi_spi
    id: amoled
    model: WAVESHARE-ESP32-S3-TOUCH-AMOLED-2.16

lvgl:
  rotation: 270

i2c:
  scl: 14
  sda: 15
  frequency: 400kHz
  s

touchscreen:
  - platform: cst9220
    id: touch_id
    reset_pin: 40
    interrupt_pin: 11
    on_touch:
      logger.log:
        format: "Touch at %d/%d"
        args: [touch.x, touch.y]
    on_release:
      logger.log: Released

motion:
  - platform: qmi8658
    id: motion_id
    update_interval: 50ms
    axis_map:
      x: y
      y: x
      z: z

sensor:
    # On-chip temperature sensor (unit: °C)
  - platform: qmi8658
    type: temperature
    name: "IMU Temperature"
    accuracy_decimals: 1

# Audio: ES8311 codec driven as a speaker over I2S
i2s_audio:
  - id: audio_bus
    i2s_mclk_pin: GPIO42
    i2s_bclk_pin: GPIO9
    i2s_lrclk_pin: GPIO45

audio_dac:
  - platform: es8311
    id: es8311_dac
    address: 0x18

speaker:
  - platform: i2s_audio
    id: esp32_speaker
    i2s_audio_id: audio_bus
    i2s_dout_pin: GPIO8
    audio_dac: es8311_dac
    dac_type: external
    channel: mono
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 48000

    # Mixer + resamplers so the media_player can feed the speaker
  - platform: mixer
    id: mixing_speaker
    output_speaker: esp32_speaker
    source_speakers:
      - id: announcement_mixing_input
        timeout: never
      - id: media_mixing_input
        timeout: never

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

# Media player that can play on-device (flash-bundled) audio files
media_player:
  - platform: speaker_source
    id: speaker_media_player
    volume_initial: 1.0
    name: "Media Player"
    media_pipeline:
      speaker: media_resampling_speaker
      sources:
        - file_source
    on_play:
      logger.log: "Playing media file"


binary_sensor:
  - id: !extend free_fall_id
    on_press:
      then:
      - logger.log: Free fall detected
      - media_player.play_media: "audio-file://scream_sound"

audio_file:
    - id: scream_sound
      file: sounds/scream.flac

media_source:
  - platform: audio_file
    id: file_source


# Power amplifier enable (PA_CTRL)
switch:
  - platform: gpio
    pin: GPIO46
    name: "Audio Amplifier"
    id: audio_amplifier
    restore_mode: ALWAYS_ON
